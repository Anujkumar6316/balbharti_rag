# =============================================================
# Balbharati Marathi Voice-Agent RAG — Configuration
# =============================================================
# Target: Raspberry Pi 5 (8GB), serial kiosk mode, 2-5s latency.
# LLM:    Qwen3-0.8B-Instruct-GGUF served via llama-server.
# =============================================================

# ---------- llama-server endpoint (OpenAI-compatible) ----------
llm:
  base_url: "http://127.0.0.1:8080/v1"
  api_key: "not-needed"
  model:   "qwen3-0.8b-instruct"
  # Generation params — tuned for combined intent+selection call
  # max_tokens=15 is enough for "हेतू: WHY\nसंदर्भ: 1" (~8 tokens)
  # NEVER use max_tokens > 20 for selection mode — it causes 8-10s latency
  temperature: 0.0               # deterministic for classification
  top_p: 0.9
  max_tokens: 15                 # combined intent + context selection
  timeout_s: 30.0
  retries: 1
  retry_backoff_ms: 250

# ---------- Embedder (MuRIL small, ~110MB) ----------
embedder:
  # HuggingFace model id (sentence-transformers compatible)
  # model_id: "sentence-transformers/muril-base-paraphrase-v1"
  # Fallback (smaller, faster) — uncomment if MuRIL is too heavy:
  model_id: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  device: "cpu"                   # Pi has no GPU
  batch_size: 32                  # for one-time index build
  normalize: true                 # L2-normalize for cosine via dot product
  max_seq_length: 64              # Marathi questions are short
  cache_dir: "./models"           # local model cache (avoid re-download)

# ---------- Knowledge base ----------
kb:
  path: "./kb/knowledgebase.json"
  index_cache_dir: "./kb/index_cache"
  rebuild: false                  # force rebuild on startup if true

# ---------- Retrieval ----------
retrieval:
  # Per-QA-pair document = canonical question + all variants, newline-joined
  # (this maximizes recall because Marathi phrasing varies wildly)
  doc_strategy: "question_plus_variants"

  # BM25 params — tuned for Indic languages (k1 smaller, b smaller because
  # Marathi questions are short and we don't want length to dominate)
  bm25:
    k1: 1.2
    b: 0.55
    # Indic-aware tokenizer (see src/tokenize.py). DO NOT use plain
    # whitespace splitting — it cripples Devanagari recall badly.
    tokenizer: "indic_syllable"

  # Dense retrieval
  dense:
    # How to aggregate per-variant embeddings into one per-QA-pair vector.
    # "max" = take max across variants per dimension — best for paraphrase recall
    pool: "max"

  # Fusion
  fusion:
    method: "rrf"                 # Reciprocal Rank Fusion
    k: 60                          # standard RRF constant
    bm25_weight: 1.0
    dense_weight: 1.0

  # Score-weighted selection (used when --skip-llm is set)
  selection:
    bm25_weight: 0.4
    dense_weight: 0.6
    min_score: 0.2               # below this → fallback

  # Cross-encoder reranker (used when --skip-llm is set)
  reranker:
    model_id: "Alibaba-NLP/gte-multilingual-reranker-base"
    threshold: 0.35               # gte reranker outputs sigmoid scores ~0.2-0.8

  # Top-K shortlist sent to LLM / reranker
  top_k: 5

  # CRAG-lite confidence gate (no extra LLM call).
  # RRF score math (k=60, 2 retrievers):
  #   max possible = 1/61 + 1/61 = 0.0328  (both retrievers rank doc #1)
  #   strong agree = 1/61 + 1/65 = 0.0318  (both in top-5)
  #   one-sided     = 1/61 + 0     = 0.0164 (only one retriever finds it)
  #   weak          = 1/91 + 0     = 0.0110 (one retriever ranks ~30th)
  #
  # If top-1 fused score < threshold_low  -> immediate "no answer" fallback
  # If top-1 fused score in [low, high)   -> LLM still sees context but with
  #                                          "may not be relevant" instruction
  # If top-1 fused score >= high          -> normal LLM answer
  confidence:
    threshold_low: 0.011           # below this = neither retriever found it strongly
    threshold_high: 0.025          # above this = both retrievers agree top-K

  # Intent-aware retrieval (root-cause fix for intent-blind retrieval)
  intent:
    enabled: true
    match_boost: 1.5               # candidates with matching intent get score × 1.5
    mismatch_penalty: 0.3          # candidates with mismatching intent get score × 0.3
    pool_multiplier: 6             # pull top_k × N candidates before intent rerank
    # Rules first (5ms). LLM intent is extracted as part of the combined
    # LLM call (intent + context selection in one response), NOT as a
    # separate call. This keeps latency at ~300-500ms total.

# ---------- Query validation gate (score-based, zero hardcoded words) ----------
# Two-stage gate using structural checks + retrieval scores.
# No word lists — adapts automatically to any KB content.
query_validation:
  enabled: true

  # Stage 1: Structural checks (before retrieval, ~0.5ms)
  structural:
    min_length: 3                 # chars — reject "a", "ok"
    max_length: 200               # chars — reject essays pasted as queries
    max_token_repeat_ratio: 0.6   # reject "hello hello hello" (60%+ same token)
    max_missing_token_ratio: 0.5  # reject if >50% query words absent from KB (incl. prefix/fuzzy)
                                  # catches anachronisms ("aircraft") without hardcoded lists

  # Stage 2: Score-based checks (after retrieval, ~0ms — scores already computed)
  # These adapt automatically as KB grows — no manual tuning per subject.
  score:
    min_dense_cosine: 0.35        # below = query doesn't semantically match any KB doc
                                  # catches gibberish ("asdfghjkl") + OOS English ("Apple founder")
    min_bm25_raw: 3.0             # below = no keyword overlap with KB
                                  # catches queries with no recognizable terms
    min_reranker_score: 0.35      # below = cross-encoder not confident
                                  # gte outputs ~0.2-0.8; threshold at 0.35 catches low-match
    min_token_coverage: 0.5       # below = query entities absent from all candidate texts
                                  # catches entity mismatch ("Sambhaji"→"Shivaji") + anachronisms

# ---------- Cache ----------
cache:
  # LRU answer cache — short queries often repeat ("fees kiti aahe", "namaskar")
  enabled: true
  max_size: 256
  # Cache key = normalized query (after normalization, before retrieval)
  key: "normalized_query"

# ---------- Pipeline behavior ----------
pipeline:
  # Strict no-hallucination: if LLM says "I don't know", respect it
  respect_llm_dont_know: true

  # Generative-LLM context selection (src/generate.py) — OFF by default.
  #
  # Root-cause note: with intent-aware reranking (retrieval.intent) and the
  # CRAG-lite gate now scoring the POST-rerank top candidate (see
  # src/pipeline.py), retrieval.candidates[0] is already a reliable,
  # well-vetted pick before any LLM is involved. In practice the small LLM
  # (Qwen3-0.8B) used for "intent + context selection" was observed to
  # output "संदर्भ: 1" (pick context 1) on every single query regardless of
  # whether context 1 was actually relevant — i.e. it added no discriminative
  # value, while costing 6-11s per query (vs ~50-150ms for retrieval alone).
  # The final answer text is always served verbatim from the KB either way
  # (no generation happens), so this step was pure latency with no accuracy
  # benefit and a (small) extra failure surface from response parsing.
  #
  # Set this to true only if you've validated, on your own LLM setup, that
  # it actually changes selections in a way that improves accuracy.
  llm_selection_enabled: false

  # Max wall-clock budget for the whole pipeline (seconds)
  latency_budget_s: 5.0
  # If pipeline exceeds budget, return fallback immediately
  fallback_message_mr: "माफ करा, मला या प्रश्नाची माहिती माहित नाही. कृपया दुसरा प्रश्न विचारा किंवा शाळेच्या कार्यालयात संपर्क करा."

# ---------- Logging ----------
logging:
  level: "INFO"                   # DEBUG | INFO | WARNING | ERROR
  file: "./logs/pipeline.log"
  json: true                      # structured JSON logs for kiosk monitoring
